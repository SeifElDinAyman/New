<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You Have Been Summoned</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=IM+Fell+English:ital@0;1&display=swap');

:root {
  --bg: #0a0806;
  --text: #c8c0a8;
  --white: #f0ead8;
  --red: #8b0000;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IM Fell English', Georgia, serif;
  margin:0;
  min-height:100vh;
  overflow-y: scroll;
}

#start-overlay {
  position: fixed; inset:0; background: rgba(10,8,6,0.95);
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  z-index: 9999; text-align:center;
}

#start-overlay h1 { color: var(--text); font-family:'Special Elite'; font-size:28px; margin-bottom:20px; }
#start-overlay p { color: rgba(255,180,180,0.6); font-family:'Special Elite'; font-size:12px; margin-bottom:30px; letter-spacing:1px; }
#start-button { padding:14px 32px; font-family:'Special Elite'; font-size:14px; letter-spacing:2px; background: var(--red); color:#fff; border:none; cursor:pointer; }
#start-button:hover { filter: brightness(1.1); }

.envelope-wrap {
  max-width: 700px;
  margin: 0 auto;
  padding: 40px 20px;
  opacity:0;
  transition: opacity 1s ease;
}

.heading {
  text-align:center;
  font-family:'Special Elite';
  font-size:22px;
  color: var(--white);
  margin-bottom: 20px;
}

.subtitle-line {
  opacity:0;
  font-size:16px;
  line-height:1.8;
  margin: 12px 0;
  transition: opacity 1s ease;
  color: var(--text);
}
</style>
</head>
<body>

<div id="start-overlay">
  <h1>Internal Affairs — Case 0114-S</h1>
  <p>⚠ Recommended: Increase your volume before proceeding</p>
  <button id="start-button">Start Investigation</button>
</div>

<audio id="voiceover" preload="auto">
  <source src="https://seifeldinayman.github.io/New/0403.MP3" type="audio/mpeg">
</audio>

<div id="main-content" class="envelope-wrap">
  <h1 class="heading">YOU HAVE BEEN SUMMONED</h1>
  <div id="subtitle-container"></div>
</div>

<script>
// SRT data
const srtLines = [
  { start:3.9, end:5.666, text:"Internal Affairs Division" },
  { start:6.2, end:8.266, text:"restricted correspondence" },
  { start:9.5, end:13.1, text:"you have been summoned case No. 0" },
  { start:13.1, end:20.1, text:"1 1 4 dash s active investigation to s s" },
  { start:20.4, end:23.166, text:"primary witness and name suspect" },
  { start:24.0, end:25.833, text:"this is not a coincidence" },
  { start:26.166, end:30.8, text:"this is not a mistake you were found" },
  { start:31.3, end:36.0, text:"a case has been reopened one that was dismissed too early" },
  { start:36.1, end:40.5, text:"closed without a verdict and buried without a confession" },
  { start:41.2, end:43.966, text:"the victim known only as SED" },
  { start:44.466, end:48.166, text:"has formally requested that the investigation resume" },
  { start:48.766, end:51.633, text:"he believes the evidence was always there" },
  { start:51.966, end:55.666, text:"he believes the criminal left traces everywhere" },
  { start:56.266, end:59.833, text:"he believes you are the one who did it" },
  { start:60.933, end:63.766, text:"she came in quietly no warning" },
  { start:63.766, end:68.633, text:"no announcement she simply arrived and everything changed" },
  { start:69.133, end:73.166, text:"I didn't notice what she took until it was already gone" },
  { start:74.1, end:77.433, text:"you are hereby summoned to review the full case file" },
  { start:77.533, end:79.033, text:"examine the evidence" },
  { start:79.066, end:84.0, text:"and determine for yourself whether what was taken was stolen" },
  { start:84.366, end:86.366, text:"or willingly surrendered" },
  { start:87.6, end:90.866, text:"warning this investigation is personal" },
  { start:91.133, end:94.433, text:"proceed only if you are prepared for the truth" },
  { start:94.766, end:98.2, text:"once you accept there is no turning back" },
  { start:99.066, end:101.566, text:"file by SED the Victim" },
  { start:101.566, end:104.6, text:"Maadi Division case No. 0" },
  { start:104.6, end:107.233, text:"1 1 4 dash s" },
  { start:108.066, end:109.933, text:"will you accept this mission" }
];

const button = document.getElementById('start-button');
const overlay = document.getElementById('start-overlay');
const mainContent = document.getElementById('main-content');
const subtitleContainer = document.getElementById('subtitle-container');
const audio = document.getElementById('voiceover');

// create <p> elements for all lines
srtLines.forEach(line=>{
  const p = document.createElement('p');
  p.className = 'subtitle-line';
  p.textContent = line.text;
  subtitleContainer.appendChild(p);
  line.element = p; // store reference
});

button.addEventListener('click', () => {
  overlay.style.display = 'none';
  mainContent.style.opacity = 1;

  const playPromise = audio.play();
  if (playPromise !== undefined) {
    playPromise.catch(error => {
      alert("Click anywhere to enable audio.");
      document.body.addEventListener('click', ()=>audio.play(), {once:true});
    });
  }

  // animate lines based on audio time
  audio.addEventListener('timeupdate', () => {
    const t = audio.currentTime;
    srtLines.forEach(line=>{
      if(t>=line.start && t<=line.end){
        line.element.style.opacity = 1;
      } else {
        line.element.style.opacity = 0;
      }
    });
  });
});
</script>
</body>
</html>
