<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case #114 — Chase</title>

<style>
body {
    margin:0;
    background:#0a0a0a;
    color:#eee;
    font-family: monospace;
    text-align:center;
}

button {
    padding:10px 20px;
    margin:10px;
    font-size:16px;
    cursor:pointer;
}

#game { display:none; }
</style>
</head>
<body>

<h2>CASE #114 — CHASE</h2>

<div id="menu">
    <input id="roomInput" placeholder="Enter Room Code" />
    <br>
    <button onclick="startHost()">Hunter (Host)</button>
    <button onclick="startPlayer()">Fugitive (Player)</button>
</div>

<div id="game">
    <h3 id="role"></h3>
    <p id="status">Waiting...</p>

    <div id="hostUI" style="display:none;">
        <button onclick="sendQuestion()">Send Question</button>
        <button onclick="catchLie()">She Lied</button>
    </div>

    <div id="playerUI" style="display:none;">
        <button onclick="answer('YES')">YES</button>
        <button onclick="answer('NO')">NO</button>
    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyAmwZlfuzoulkQMkILWGVF1pFM-I5Tiq0E",
  authDomain: "case114117.firebaseapp.com",
  databaseURL: "https://case114117-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "case114117",
  storageBucket: "case114117.firebasestorage.app",
  messagingSenderId: "868073802486",
  appId: "1:868073802486:web:cca0c4a033524f706bfad7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let ROOM = "";
let role = "";

// 🔁 Subscribe realtime
function subscribe(callback){
    db.ref("chase/" + ROOM).on("value", snap=>{
        if(snap.exists()) callback(snap.val());
    });
}

// 🎮 HOST
function startHost(){
    ROOM = document.getElementById("roomInput").value;
    role = "host";

    document.getElementById("menu").style.display="none";
    document.getElementById("game").style.display="block";
    document.getElementById("role").textContent="Hunter";

    document.getElementById("hostUI").style.display="block";

    db.ref("chase/"+ROOM).set({
        phase:"waiting",
        joined:false
    });

    subscribe(state=>{
        if(state.joined){
            document.getElementById("status").textContent="Player connected!";
        }

        if(state.a){
            document.getElementById("status").textContent="She said: "+state.a;
        }

        if(state.caught){
            document.getElementById("status").textContent="You caught her!";
        }
    });
}

// 🏃 PLAYER
function startPlayer(){
    ROOM = document.getElementById("roomInput").value;
    role = "player";

    document.getElementById("menu").style.display="none";
    document.getElementById("game").style.display="block";
    document.getElementById("role").textContent="Fugitive";

    document.getElementById("playerUI").style.display="block";

    db.ref("chase/"+ROOM).update({
        joined:true
    });

    subscribe(state=>{
        if(state.q){
            document.getElementById("status").textContent="Question received!";
        }

        if(state.caught){
            document.getElementById("status").textContent="You've been caught!";
        }
    });
}

// ❓ Host sends question
function sendQuestion(){
    db.ref("chase/"+ROOM).update({
        q:"Is she lying?"
    });
}

// 🙋 Player answers
function answer(val){
    db.ref("chase/"+ROOM).update({
        a:val
    });
}

// 🎯 Host catches
function catchLie(){
    db.ref("chase/"+ROOM).update({
        caught:true
    });
}
</script>

</body>
</html>
