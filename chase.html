<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// FIREBASE

    apiKey: "AIzaSyAmwZlfuzoulkQMkILWGVF1pFM-I5Tiq0E",
    authDomain: "case114117.firebaseapp.com",

    storageBucket: "case114117.firebasestorage.app",
    messagingSenderId: "868073802486",

    databaseURL: "https://case114117-default-rtdb.europe-west1.firebasedatabase.app/"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// STATE
let ROOM = '';
let IS_HUNTER = false;
let gameRef = null;

// UI
const $ = id => document.getElementById(id);

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    $(id).classList.add('active');
}

// INPUT
$('roomInput').addEventListener('input', () => {
    $('roomInput').value = $('roomInput').value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,4);
});

$('btnHunter').onclick = () => {
    const code = $('roomInput').value.trim();
    if (code.length < 2) return alert("Enter code");
    ROOM = code;
    IS_HUNTER = true;
    initHunter();
};

$('btnFugitive').onclick = () => {
    const code = $('roomInput').value.trim();
    if (code.length < 2) return alert("Enter code");
    ROOM = code;
    IS_HUNTER = false;
    initFugitive();
};

// HUNTER
async function initHunter() {
    showScreen('waitScreen');
    $('waitCode').textContent = ROOM;

    gameRef = ref(db, `flash/${ROOM}`);

    await set(gameRef, {
        started: false,
        playerReady: false,
        hunterCalib: false,
        fugitiveCalib: false
    });

    let startedOnce = false;

    onValue(gameRef, snap => {
        const s = snap.val();
        if (!s) return;

        console.log("Hunter:", s);

        if (s.playerReady && !s.started) {
            update(gameRef, { started: true });
        }

        if (s.started && !startedOnce) {
            startedOnce = true;
            goCalibrate();
        }
    });
}

// FUGITIVE
function initFugitive() {
    showScreen('waitScreen');
    $('waitCode').textContent = ROOM;

    gameRef = ref(db, `flash/${ROOM}`);

    update(gameRef, { playerReady: true });

    let startedOnce = false;

    onValue(gameRef, snap => {
        const s = snap.val();
        if (!s) return;

        console.log("Fugitive:", s);

        if (s.started && !startedOnce) {
            startedOnce = true;
            goCalibrate();
        }
    });
}

// CALIBRATION
function goCalibrate() {
    showScreen('calibScreen');
}

$('calibBtn').onclick = () => {
    const key = IS_HUNTER ? 'hunterCalib' : 'fugitiveCalib';
    update(gameRef, { [key]: true });

    let started = false;

    onValue(gameRef, snap => {
        const s = snap.val();
        if (!s) return;

        if (s.hunterCalib && s.fugitiveCalib && !started) {
            started = true;
            startCountdown();
        }
    });
};

// COUNTDOWN
function startCountdown() {
    showScreen('arenaScreen');

    const overlay = $('countdownOverlay');
    overlay.style.display = 'flex';

    let n = 3;
    $('cdNum').textContent = n;

    const iv = setInterval(() => {
        n--;
        if (n > 0) {
            $('cdNum').textContent = n;
        } else {
            clearInterval(iv);
            $('cdNum').textContent = "GO";
            setTimeout(() => {
                overlay.style.display = 'none';
                startGame();
            }, 800);
        }
    }, 1000);
}

// GAME (placeholder — your original logic continues here)
function startGame() {
    alert("Game started ✅");
}
</script>
