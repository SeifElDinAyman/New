<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restricted Archive</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    background: #050505;
    font-family: "Courier New", monospace;
    color: #bbb;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 15px;
    perspective: 1200px;
    overflow: hidden;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at top, rgba(139,0,0,0.12), transparent 35%),
        repeating-linear-gradient(
            to bottom,
            rgba(255,255,255,0.02) 0px,
            rgba(255,255,255,0.02) 1px,
            transparent 2px,
            transparent 4px
        );
    opacity: 0.5;
    pointer-events: none;
}

.card {
    width: 100%;
    max-width: 360px;
    height: 405px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 1s cubic-bezier(0.68, -0.55, 0.265, 1.55), box-shadow 0.4s;
    display: block;
}

.card.glow {
    box-shadow: 0 0 20px #00ff9c, 0 0 60px rgba(0,255,156,0.75), 0 0 100px rgba(0,255,156,0.45);
}

.card.flipped {
    transform: rotateY(180deg) rotateZ(1deg);
}

.container {
    background: #0d0d0d;
    border: 1px solid #222;
    padding: 20px;
    text-align: center;
    box-shadow: 0 0 40px rgba(0,0,0,0.9);
    border-radius: 12px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    width: 100%;
    height: 100%;
    position: absolute;
    inset: 0;
    overflow: hidden;
}

.front { z-index: 2; }

.back {
    transform: rotateY(180deg);
    color: #c9a84c;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    line-height: 1.6;
    opacity: 0;
    transition: opacity 0.8s ease 0.45s;
    padding: 24px;
    text-align: center;
}

.card.flipped .back {
    opacity: 1;
}

.badge {
    background: #8b0000;
    color: #ffcccc;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 6px 10px;
    margin-bottom: 15px;
    display: inline-block;
    border-radius: 4px;
    box-shadow: 0 0 12px rgba(139,0,0,0.25);
}

h1 {
    font-size: 18px;
    color: #e0e0e0;
    margin: 10px 0;
    letter-spacing: 1px;
}

.subtitle {
    color: #c9a84c;
    margin: 0 0 10px;
    font-size: 12px;
    line-height: 1.3;
}

.hint {
    margin: 0 0 12px;
    font-size: 11px;
    color: #8f8f8f;
    line-height: 1.5;
    border-top: 1px solid #1a1a1a;
    border-bottom: 1px solid #1a1a1a;
    padding: 10px 0;
}

.hint .label {
    color: #c9a84c;
    display: block;
    margin-bottom: 4px;
    letter-spacing: 1px;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #000;
    border: 1px solid #333;
    color: #ccc;
    text-align: center;
    border-radius: 6px;
    outline: none;
}

input:focus {
    border-color: #555;
    box-shadow: 0 0 10px rgba(201,168,76,0.12);
}

button {
    margin-top: 12px;
    width: 100%;
    padding: 10px;
    background: #8b0000;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 6px;
    letter-spacing: 1px;
}

button:hover {
    filter: brightness(1.05);
}

button:disabled {
    opacity: 0.7;
    cursor: default;
}

#terminal {
    margin-top: 15px;
    text-align: left;
    font-size: 11px;
    color: #00ff9c;
    height: 78px;
    overflow: hidden;
    line-height: 1.4;
    transition: text-shadow 0.2s;
    white-space: pre-wrap;
}

.progress {
    width: 100%;
    height: 6px;
    background: #111;
    margin-top: 10px;
    display: none;
    border-radius: 10px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #00ff9c;
    transition: width 0.2s;
    border-radius: 10px;
    box-shadow: 0 0 12px rgba(0,255,156,0.45);
}

.system {
    margin-top: 12px;
    font-size: 10px;
    color: #555;
    line-height: 1.4;
}

.error {
    color: red;
    margin-top: 10px;
    font-size: 12px;
    min-height: 16px;
}

.glitch {
    animation: glitch 0.2s infinite;
}

@keyframes glitch {
    0% { transform: translate(1px, -1px); }
    50% { transform: translate(-1px, 1px); }
    100% { transform: translate(1px, 1px); }
}

@keyframes flicker {
    0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { text-shadow: 0 0 2px #00ff9c; }
    20%, 22%, 24%, 55% { text-shadow: 0 0 12px #00ff9c; }
}

.flicker { animation: flicker 0.15s infinite; }

.shake {
    animation: shake 0.22s linear 1;
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-3px); }
    50% { transform: translateX(3px); }
    75% { transform: translateX(-2px); }
    100% { transform: translateX(0); }
}
</style>
</head>
<body>

<div class="card" id="card">
    <div class="container front">
        <div class="badge">RESTRICTED ARCHIVE</div>
        <h1 id="title">ENTER ACCESS DATE</h1>

        <p class="subtitle">
            &ldquo;The date all curses ended.&rdquo;
        </p>

        <div class="hint">
            <span class="label">Hint:</span>
            The moment everything changed.<br>
            The day the curse ended.<br>
            The beginning of something irreversible.
        </div>

        <input type="date" id="password">
        <button id="enterBtn" type="button">ENTER</button>

        <div id="terminal"></div>

        <div class="progress" id="progress">
            <div class="progress-bar" id="bar"></div>
        </div>

        <div class="system">
            IP Logged: Cairo, Egypt<br>
            Device: Mobile Access Detected
        </div>

        <div id="error" class="error"></div>
    </div>

    <div class="container back" id="backMessage">
        Interrogation Video will be shown now...
    </div>
</div>

<script>
const correctDate = "2025-07-11";
const redirectUrl = "https://www.google.com";

const logs = [
    "Establishing secure connection...",
    "Bypassing firewall...",
    "Injecting credentials...",
    "Decrypting archive...",
    "Extracting hidden files...",
    "Verifying access level...",
    "Access granted..."
];

const title = document.getElementById("title");
const passwordInput = document.getElementById("password");
const enterBtn = document.getElementById("enterBtn");
const error = document.getElementById("error");
const terminal = document.getElementById("terminal");
const progress = document.getElementById("progress");
const bar = document.getElementById("bar");
const card = document.getElementById("card");

let isRunning = false;
let newTab = null;

function typeLine(text, callback) {
    let i = 0;

    function type() {
        if (i < text.length) {
            terminal.innerHTML += text.charAt(i);
            i++;
            setTimeout(type, 20);
        } else {
            terminal.innerHTML += "<br>";
            terminal.scrollTop = terminal.scrollHeight;
            if (callback) setTimeout(callback, 100);
        }
    }

    type();
}

function streamLogs(i = 0) {
    terminal.classList.add("flicker");

    if (i < logs.length) {
        typeLine(logs[i], () => streamLogs(i + 1));
    } else {
        terminal.classList.remove("flicker");
    }
}

function startProgress() {
    progress.style.display = "block";
    let width = 0;

    const interval = setInterval(() => {
        width += Math.random() * 12;
        width = Math.min(width, 100);
        bar.style.width = width + "%";

        if (width >= 100) {
            clearInterval(interval);
            showAccessGranted();
        }
    }, 180);
}

function showAccessGranted() {
    title.textContent = "ACCESS GRANTED";
    title.classList.add("glitch");
    card.classList.add("glow");

    setTimeout(() => {
        card.classList.add("flipped");

        setTimeout(() => {
            if (newTab && !newTab.closed) {
                newTab.location.href = redirectUrl;
            } else {
                error.textContent = "Popup was blocked. Please allow popups and try again.";
            }
        }, 2200);
    }, 1400);
}

function lockInputs() {
    passwordInput.disabled = true;
    enterBtn.disabled = true;
    passwordInput.style.display = "none";
    enterBtn.style.display = "none";
}

function denyAccess() {
    error.textContent = "ACCESS DENIED";
    card.classList.add("shake");
    setTimeout(() => card.classList.remove("shake"), 240);
}

function checkPassword() {
    if (isRunning) return;

    const input = passwordInput.value;
    error.textContent = "";

    if (!input) {
        error.textContent = "PLEASE SELECT A DATE";
        return;
    }

    if (input === correctDate) {
        newTab = window.open("about:blank", "_blank");

        if (!newTab) {
            error.textContent = "Please allow popups for this site.";
            return;
        }

        isRunning = true;
        lockInputs();
        streamLogs();
        setTimeout(startProgress, 1800);
    } else {
        denyAccess();
    }
}

enterBtn.addEventListener("click", checkPassword);

passwordInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        checkPassword();
    }
});
</script>

</body>
</html>
