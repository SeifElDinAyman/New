<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase Test — Case 114</title>
</head>
<body>
<h2>Firebase Realtime DB Test</h2>
<button id="btnConnect">Connect & Write</button>
<div id="status">Status: Not connected</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// 🔹 Your Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAmwZlfuzoulkQMkILWGVF1pFM-I5Tiq0E",
  authDomain: "case114117.firebaseapp.com",
  databaseURL: "https://case114117-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "case114117",
  storageBucket: "case114117.firebasestorage.app",
  messagingSenderId: "868073802486",
  appId: "1:868073802486:web:cca0c4a033524f706bfad7"
};

// 🔹 Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔹 Button click to test DB write
document.getElementById('btnConnect').addEventListener('click', async () => {
    try {
        await db.ref("test").set({ status: "connected", timestamp: Date.now() });
        document.getElementById('status').textContent = 'Status: Connected & Written!';
        console.log("✅ Written to Firebase Realtime Database.");
    } catch (err) {
        document.getElementById('status').textContent = 'Status: Error!';
        console.error("❌ Firebase write failed:", err);
    }
});
</script>
</body>
</html>
