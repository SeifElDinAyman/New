<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restricted Archive</title>

<style>
body {
    margin: 0;
    background: #0a0a0a;
    font-family: "Courier New", monospace;
    color: #bbb;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
}

.container {
    background: #111;
    border: 1px solid #2a2a2a;
    padding: 30px;
    width: 90%;
    max-width: 360px;
    text-align: center;
    box-shadow: 0 0 30px rgba(0,0,0,0.8);
    border-radius: 10px;
}

.badge {
    background: #8b0000;
    color: #ffcccc;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 6px 10px;
    display: inline-block;
    margin-bottom: 20px;
}

h1 {
    font-size: 18px;
    color: #e0e0e0;
    margin-bottom: 10px;
}

p {
    font-size: 12px;
    color: #666;
    line-height: 1.6;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    background: #0d0d0d;
    border: 1px solid #333;
    color: #ccc;
    text-align: center;
    font-family: "Courier New", monospace;
}

button {
    margin-top: 15px;
    width: 100%;
    padding: 10px;
    background: #8b0000;
    border: none;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #a00000;
}

#typing {
    color: #00ff9c;
    font-size: 12px;
    height: 20px;
    margin-top: 15px;
}

.system {
    margin-top: 15px;
    font-size: 11px;
    color: #444;
}

.error {
    color: red;
    margin-top: 10px;
    font-size: 12px;
}

/* subtle flicker */
@keyframes flicker {
    0% {opacity: 0.95;}
    50% {opacity: 1;}
    100% {opacity: 0.95;}
}
body {
    animation: flicker 2s infinite;
}
</style>
</head>

<body>

<div class="container">
    <div class="badge">RESTRICTED ARCHIVE</div>

    <h1>ACCESS DENIED</h1>

    <p>
        This archive is protected.<br>
        Only authorized investigators may proceed.
    </p>

    <input type="date" id="password">

    <button onclick="checkPassword()">ENTER</button>

    <div id="typing"></div>

    <div class="system">
        IP Logged: Cairo, Egypt<br>
        Device: Mobile Access Detected
    </div>

    <div id="error" class="error"></div>
</div>

<script>
const correctDate = "2025-07-11";

function typeEffect(text, element, speed = 40) {
    element.innerHTML = "";
    let i = 0;
    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }
    typing();
}

function checkPassword() {
    const input = document.getElementById("password").value;
    const typingDiv = document.getElementById("typing");
    const errorDiv = document.getElementById("error");

    errorDiv.innerHTML = "";

    if (input === correctDate) {
        typeEffect("Decrypting archive...", typingDiv);

        setTimeout(() => {
            window.location.href = "PUT_YOUR_NEXT_LINK_HERE";
        }, 2500);

    } else {
        errorDiv.innerHTML = "ACCESS DENIED";
    }
}
</script>

</body>
</html>
