<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restricted Archive</title>

<style>
body {
    margin: 0;
    background: #050505;
    font-family: "Courier New", monospace;
    color: #bbb;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
}

.container {
    background: #0d0d0d;
    border: 1px solid #222;
    padding: 25px;
    width: 90%;
    max-width: 360px;
    text-align: center;
    box-shadow: 0 0 40px rgba(0,0,0,0.9);
    border-radius: 10px;
}

.badge {
    background: #8b0000;
    color: #ffcccc;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 6px 10px;
    margin-bottom: 20px;
    display: inline-block;
}

h1 {
    font-size: 18px;
    color: #e0e0e0;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    background: #000;
    border: 1px solid #333;
    color: #ccc;
    text-align: center;
}

button {
    margin-top: 15px;
    width: 100%;
    padding: 10px;
    background: #8b0000;
    border: none;
    color: white;
    cursor: pointer;
}

#terminal {
    margin-top: 15px;
    text-align: left;
    font-size: 11px;
    color: #00ff9c;
    height: 100px;
    overflow: hidden;
}

.progress {
    width: 100%;
    height: 6px;
    background: #111;
    margin-top: 10px;
    display: none;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #00ff9c;
    transition: width 0.2s;
}

.system {
    margin-top: 10px;
    font-size: 10px;
    color: #444;
}

.error {
    color: red;
    margin-top: 10px;
}

.glitch {
    animation: glitch 0.2s infinite;
}

@keyframes glitch {
    0% {transform: translate(1px, -1px);}
    50% {transform: translate(-1px, 1px);}
    100% {transform: translate(1px, 1px);}
}
</style>
</head>

<body>

<div class="container">
    <div class="badge">RESTRICTED ARCHIVE</div>
    <h1 id="title">ACCESS DENIED</h1>

    <input type="date" id="password">
    <button onclick="checkPassword()">ENTER</button>

    <div id="terminal"></div>

    <div class="progress" id="progress">
        <div class="progress-bar" id="bar"></div>
    </div>

    <div class="system">
        IP Logged: Cairo, Egypt<br>
        Device: Mobile Access Detected
    </div>

    <div id="error" class="error"></div>
</div>

<script>
const correctDate = "2025-07-11";

const logs = [
    "Establishing secure connection...",
    "Bypassing firewall...",
    "Injecting credentials...",
    "Decrypting archive...",
    "Extracting hidden files...",
    "Verifying access level...",
    "Access granted..."
];

function streamLogs() {
    const terminal = document.getElementById("terminal");
    let i = 0;

    function addLine() {
        if (i < logs.length) {
            terminal.innerHTML += logs[i] + "<br>";
            terminal.scrollTop = terminal.scrollHeight;
            i++;
            setTimeout(addLine, 400);
        }
    }
    addLine();
}

function startProgress() {
    const bar = document.getElementById("bar");
    const progress = document.getElementById("progress");
    progress.style.display = "block";

    let width = 0;
    let interval = setInterval(() => {
        width += Math.random() * 15;
        bar.style.width = width + "%";

        if (width >= 100) {
            clearInterval(interval);
            success();
        }
    }, 200);
}

function success() {
    const title = document.getElementById("title");
    title.innerText = "ACCESS GRANTED";
    title.classList.add("glitch");

    setTimeout(() => {
        window.location.href = "http://google.com/";
    }, 2000);
}

function checkPassword() {
    const input = document.getElementById("password").value;
    const error = document.getElementById("error");

    error.innerHTML = "";

    if (input === correctDate) {
        document.querySelector("button").style.display = "none";
        document.getElementById("password").style.display = "none";

        streamLogs();
        setTimeout(startProgress, 1500);

    } else {
        error.innerHTML = "BCCESS DENIED";
    }
}
</script>

</body>
</html>
