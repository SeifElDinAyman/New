<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Restricted Archive</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    background: #050505;
    font-family: "Courier New", monospace;
    color: #bbb;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 15px;
    perspective: 1200px;
}

.card {
    width: 100%;
    max-width: 360px;
    height: 420px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 1s cubic-bezier(0.68, -0.55, 0.265, 1.55), box-shadow 0.4s;
}

.card.glow {
    box-shadow: 0 0 20px #00ff9c, 0 0 60px #00ff9c, 0 0 100px #00ff9c;
}

.card.flipped {
    transform: rotateY(180deg) rotateZ(1deg);
}

.container {
    background: #0d0d0d;
    border: 1px solid #222;
    padding: 20px;
    text-align: center;
    box-shadow: 0 0 40px rgba(0,0,0,0.9);
    border-radius: 12px;
    width: 100%;
    height: 100%;
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
}

.front {
    z-index: 2;
}

.back {
    transform: rotateY(180deg);
    color: #c9a84c;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    opacity: 0;
    transition: opacity 1s ease 0.8s;
    padding: 24px;
}

.card.flipped .back {
    opacity: 1;
}

.badge {
    background: #8b0000;
    color: #ffcccc;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 6px 10px;
    margin-bottom: 15px;
    display: inline-block;
    border-radius: 4px;
}

h1 {
    font-size: 18px;
    color: #e0e0e0;
    margin: 10px 0;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #000;
    border: 1px solid #333;
    color: #ccc;
    text-align: center;
    border-radius: 6px;
}

button {
    margin-top: 12px;
    width: 100%;
    padding: 10px;
    background: #8b0000;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 6px;
}

button:hover {
    opacity: 0.95;
}

#terminal {
    margin-top: 15px;
    text-align: left;
    font-size: 11px;
    color: #00ff9c;
    height: 90px;
    overflow: hidden;
    line-height: 1.4;
    transition: text-shadow 0.2s;
    white-space: pre-wrap;
}

.progress {
    width: 100%;
    height: 6px;
    background: #111;
    margin-top: 10px;
    display: none;
    border-radius: 10px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #00ff9c;
    transition: width 0.2s;
    border-radius: 10px;
}

.system {
    margin-top: 12px;
    font-size: 10px;
    color: #555;
    line-height: 1.4;
}

.error {
    color: red;
    margin-top: 10px;
    font-size: 12px;
    min-height: 16px;
}

.glitch {
    animation: glitch 0.2s infinite;
}

@keyframes glitch {
    0% { transform: translate(1px, -1px); }
    50% { transform: translate(-1px, 1px); }
    100% { transform: translate(1px, 1px); }
}

@keyframes flicker {
    0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { text-shadow: 0 0 2px #00ff9c; }
    20%, 22%, 24%, 55% { text-shadow: 0 0 12px #00ff9c; }
}

.flicker {
    animation: flicker 0.15s infinite;
}
</style>
</head>
<body>

<div class="card" id="card">
    <div class="container front">
        <div class="badge">RESTRICTED ARCHIVE</div>
        <h1 id="title">ENTER ACCESS DATE</h1>

        <p style="color:#c9a84c; margin:0 0 6px; font-size:12px; line-height:1.3;">
            &ldquo;The date all curses ended.&rdquo;
        </p>

        <input type="date" id="password" />
        <button id="enterBtn" type="button">ENTER</button>

        <div id="terminal"></div>

        <div class="progress" id="progress">
            <div class="progress-bar" id="bar"></div>
        </div>

        <div class="system">
            IP Logged: Cairo, Egypt<br />
            Device: Mobile Access Detected
        </div>

        <div id="error" class="error"></div>
    </div>

    <div class="container back" id="backMessage">
        Interrogation Video will be shown now...
    </div>
</div>

<script>
const correctDate = "2025-07-11";

const logs = [
    "Establishing secure connection...",
    "Bypassing firewall...",
    "Injecting credentials...",
    "Decrypting archive...",
    "Extracting hidden files...",
    "Verifying access level...",
    "Access granted..."
];

const title = document.getElementById("title");
const passwordInput = document.getElementById("password");
const enterBtn = document.getElementById("enterBtn");
const error = document.getElementById("error");
const terminal = document.getElementById("terminal");
const progress = document.getElementById("progress");
const bar = document.getElementById("bar");
const card = document.getElementById("card");

function resetUI() {
    error.textContent = "";
    terminal.innerHTML = "";
    progress.style.display = "none";
    bar.style.width = "0%";
}

function typeLine(text, callback) {
    let i = 0;

    function type() {
        if (i < text.length) {
            terminal.innerHTML += text.charAt(i);
            i++;
            setTimeout(type, 20);
        } else {
            terminal.innerHTML += "<br>";
            terminal.scrollTop = terminal.scrollHeight;
            if (callback) setTimeout(callback, 100);
        }
    }

    type();
}

function streamLogs(i = 0) {
    terminal.classList.add("flicker");

    if (i < logs.length) {
        typeLine(logs[i], () => streamLogs(i + 1));
    } else {
        terminal.classList.remove("flicker");
    }
}

function startProgress() {
    progress.style.display = "block";

    let width = 0;
    const interval = setInterval(() => {
        width += Math.random() * 12;
        width = Math.min(width, 100);
        bar.style.width = width + "%";

        if (width >= 100) {
            clearInterval(interval);
            showAccessGranted();
        }
    }, 180);
}

function showAccessGranted() {
    title.textContent = "ACCESS GRANTED";
    title.classList.add("glitch");
    card.classList.add("glow");

    setTimeout(() => {
        card.classList.add("flipped");

        setTimeout(() => {
            // Example:
             window.location.href = "google.com";
        }, 2500);
    }, 1500);
}

function lockInputs() {
    passwordInput.disabled = true;
    enterBtn.disabled = true;
    passwordInput.style.display = "none";
    enterBtn.style.display = "none";
}

function checkPassword() {
    const input = passwordInput.value;
    resetUI();

    if (!input) {
        error.textContent = "PLEASE SELECT A DATE";
        return;
    }

    if (input === correctDate) {
        lockInputs();
        streamLogs();
        setTimeout(startProgress, 1800);
    } else {
        error.textContent = "ACCESS DENIED";
    }
}

enterBtn.addEventListener("click", checkPassword);

passwordInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        checkPassword();
    }
});
</script>

</body>
</html>
